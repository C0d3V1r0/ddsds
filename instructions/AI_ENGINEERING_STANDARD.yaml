ai_стандарт_разработки:
  версия: 1.1
  уровень: production
  обязательный: true

  мета:
    уровень_разработчика: "junior+/middle"
    стиль_кода: "процедурный"
    подход_к_разработке: "императивный"
    ооп_разрешён: false
    язык_комментариев: "ru"
    единый_стиль_обязателен: true

  принципы:
    - код_должен_выглядеть_как_написанный_человеком
    - читаемость_важнее_хитрости
    - только_практичные_решения
    - поддерживаемость_в_приоритете
    - предсказуемость_поведения
    - отсутствие_лишней_сложности

  архитектурные_правила:
    - только_процедурный_стиль
    - императивный_подход_по_умолчанию
    - без_ооп_без_требования
    - без_паттернов_без_необходимости
    - без_лишних_абстракций
    - один_модуль_одна_ответственность
    - избегать_скрытой_логики
    - избегать_неявных_зависимостей

  интерпретация_для_ии:
    императивный_подход:
      - использовать_как_стиль_по_умолчанию
      - писать_логику_последовательными_явными_шагами
      - предпочитать_явный_контроль_потока_if_else_return_циклы
      - минимизировать_скрытую_магию_и_непрозрачные_абстракции
      - функциональные_приемы_допустимы_только_если_они_упрощают_читаемость
      - запрещены_сложные_цепочки_и_перегруженные_композиции
    ооп:
      - запрет_остается_безусловным
      - классы_наследование_и_ооп_паттерны_не_используются

  строгая_типизация:
    обязательна: true
    область_применения: "веб_разработка_на_typescript"
    правила:
      - запрещено_игнорировать_типовые_ошибки
      - в_ts_веб_коде_any_запрещен
      - в_ts_веб_коде_as_запрещен_без_рантайм_проверки
      - ts_ignore_и_ts_nocheck_запрещены
      - non_null_assertion_запрещен_без_проверки
      - любое_ослабление_типизации_требует_явного_обоснования_в_комментарии

  правила_именования:
    переменные:
      - должны_быть_понятными
      - должны_отражать_назначение
      - без_однобуквенных_имен_кроме_итераторов
      - без_случайных_сокращений
    допустимые_короткие_имена:
      - id
      - url
      - api
      - dto

  форматирование:
    - единые_отступы
    - логические_отступы_между_блоками
    - импорты_в_начале_файла
    - без_смешивания_стилей
    - предсказуемая_структура
    - единый_кодстайл_во_всем_проекте

  код_стайл_и_архитектура:
    обязательны: true
    правила:
      - единый_стиль_именования_во_всех_модулях
      - единый_подход_к_структуре_файлов_и_директорий
      - архитектурные_решения_должны_быть_последовательны
      - локальные_исключения_фиксируются_в_документации
      - новый_код_обязан_следовать_общему_стандарту

  комментарии:
    язык: ru
    правила:
      - объяснять_почему_а_не_что
      - обязательны_для_сложной_логики
      - не_комментировать_очевидное
      - без_шума
      - должны_помогать_разработчику

  ограничения_логики:
    максимальная_вложенность: 3
    правила:
      - избегать_сложных_однострочников
      - не_использовать_трюки_языка
      - предпочитать_простые_конструкции
      - упрощать_если_возможно

  поддерживаемость:
    правила:
      - код_должен_легко_читаться
      - повторения_выносить_в_функции
      - соблюдать_dry
      - не_дублировать_логику
      - изменения_не_ломают_старый_функционал
      - минимальная_связанность_модулей
      - функции_понятны_изолированно

  безопасность:
    валидация_входных_данных:
      - проверять_все_входные_данные
      - никогда_не_доверять_вводу
      - проверять_типы
      - проверять_диапазоны
      - проверять_формат

    работа_с_данными:
      - не_исполнять_динамический_код
      - не_хранить_секреты_в_коде
      - секреты_только_из_env
      - не_логировать_секреты

    обработка_ошибок:
      - обрабатывать_ожидаемые_ошибки
      - не_раскрывать_внутренние_данные
      - безопасные_сообщения_пользователю

    файлы_и_сеть:
      - проверять_пути
      - защита_от_path_traversal
      - проверять_типы_файлов
      - ограничивать_размеры

    зависимости:
      - только_необходимые
      - без_библиотек_ради_одной_функции
      - предпочтение_стандартной_библиотеке

  тестирование:
    обязательно: true
    директория: "/tests"
    минимальные_кейсы:
      - успешный
      - ошибочный
      - граничный
    требования:
      - читаемые
      - независимые
      - запуск_одной_командой
      - падение_тестов_блокирует_релиз

  линтеры_и_статический_анализ:
    обязательны: true
    правила:
      - в_ts_веб_коде_линтер_должен_падать_на_any_as_ts_ignore_и_аналогичных_ослаблениях
      - линтер_должен_блокировать_merge_при_ошибках
      - предупреждения_по_качеству_кода_не_игнорируются_без_обоснования
      - форматтер_и_линтер_должны_использовать_единые_правила
      - ci_обязательно_проверяет_линт_и_типизацию

  документация:
    обязательна: true
    структура:
      - /docs
      - README.md
    правила:
      - обновлять_после_изменений
      - документировать_новый_функционал
      - фиксировать_изменения_api
      - добавлять_примеры
    должна_описывать:
      - назначение
      - использование
      - входные_параметры
      - примеры

  требования_production_качества:
    - читаемый
    - безопасный
    - тестируемый
    - предсказуемый
    - расширяемый
    - структурированный
    - без_мертвого_кода
    - без_временных_решений
    - без_закомментированного_старого_кода

  чеклист_готовности:
    - простой_и_понятный
    - без_дублирования
    - без_лишних_абстракций
    - есть_тесты
    - безопасность_проверена
    - документация_обновлена
    - нет_скрытой_логики
    - структура_логична

  поведение_ии:
    - писать_естественно
    - мыслить_как_разработчик
    - избегать_шаблонности
    - не_переусложнять
    - принимать_практичные_решения
    - учитывать_масштабируемость
    - учитывать_безопасность
    - учитывать_читаемость_для_команды
    - эти_правила_обязательны_для_каждой_генерации_кода
    - не_отклоняться_от_стандарта_без_явного_разрешения
