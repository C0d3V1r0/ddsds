# Канал агента не должен быть публичным.
# По умолчанию разрешаем только loopback, потому что штатный агент стучится в API локально.
allow 127.0.0.1;
allow ::1;

# Если тебе действительно нужен внешний агент через nginx,
# добавляй конкретные доверенные подсети явно, например:
# allow 10.0.0.0/8;
# allow 192.168.0.0/16;
# allow 172.16.0.0/12;

deny all;
