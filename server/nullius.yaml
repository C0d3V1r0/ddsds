agent:
  metrics_interval: 5
  services_interval: 30
  log_sources:
    - /var/log/auth.log
    - /var/log/nginx/access.log
    - /var/log/nginx/error.log
    - /var/log/ufw.log
    - /var/log/kern.log

security:
  operation_mode: auto_defend
  ssh_brute_force:
    threshold: 5
    window: 300
    action: block
    block_duration: 86400
  ssh_invalid_user:
    enabled: true
    threshold: 4
    window: 300
    action: review
  web_attacks:
    enabled: true
    action: block
  recon_probes:
    enabled: true
    action: review
  port_scan:
    enabled: true
    window: 120
    unique_ports_threshold: 12
    action: review
  auto_block: true
  event_dedup_window: 300
  response_cooldown: 900
  medium_escalation_window: 900
  medium_escalation_threshold: 3
  allowed_services:
    - nginx
    - postgresql
    - redis
    - mysql
    - docker

ml:
  anomaly_detection: true
  training_period: 86400
  sensitivity: medium
  log_classifier_min_confidence: 0.6
  baseline_hours: 24
  baseline_buffer_seconds: 300
  min_clean_samples: 100
  max_clean_events: 10
  host_profile: generic
  maintenance_window_seconds: 900
  maintenance_commands:
    - restart_service
    - kill_process
    - force_kill_process

api:
  require_bearer_auth: false
  require_ws_token: false
  token: ""
  ws_token: ""
  cors_origins:
    - http://localhost:3000

risk:
  snapshot_interval: 300
  history_points: 24
